<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>天光云影</title>
    <link href="./web_push_css.css" rel="stylesheet" />
    <script src="./web_push_js.js"></script>

    <style>
        .van-theme-dark body {
            color: #f5f5f5;
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="min-h-100vh pt-46px pb-66px" id="app">
        <van-config-provider :theme="isDark ? 'dark' : undefined">
            <template v-if="info">
                <div class="p-20px pt-0">
                    <div class="ml-16px text-32px">{{ info.appTitle }}</div>
                    <div class="ml-16px text-gray text-14px">{{ info.appRepo }}</div>
                </div>

                <template v-if="tabActive === 'live'">
                    <van-cell-group inset>
                        <van-cell title="点击进入高级模式" is-link url="/advance"></van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="直播源">
                        <van-cell title="自定义直播源">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <span>支持m3u、txt格式</span>
                                    <van-field class="!pl-0" input-align="right" label="类型">
                                        <template #input>
                                            <van-radio-group direction="horizontal" v-model="iptvSource.type">
                                                <van-radio name="url">远程</van-radio>
                                                <van-radio name="file">文件</van-radio>
                                                <van-radio name="content">静态</van-radio>
                                            </van-radio-group>
                                        </template>
                                    </van-field>
                                    <van-field class="!pl-0" input-align="right" label="名称" placeholder="直播源名称" v-model="iptvSource.name"></van-field>
                                    <van-field class="!pl-0" input-align="right" label="链接" placeholder="直播源链接" v-if="iptvSource.type === 'url'" v-model="iptvSource.url"></van-field>
                                    <van-field class="!pl-0" input-align="right" label="文件路径" placeholder="直播源文件路径" v-else-if="iptvSource.type === 'file'" v-model="iptvSource.filePath"></van-field>
                                    <template v-else-if="iptvSource.type === 'content'">
                                        <van-field :input-align="iptvSource.content ? 'left' : 'right'" class="!pl-0" label="内容" placeholder="直播源内容" rows="5" type="textarea" v-model="iptvSource.content"></van-field>
                                        <van-field class="!pl-0" input-align="right" label="上传">
                                            <template #input>
                                                <van-uploader :after-read="uploadIptvSourceContentAfterRead" accept=".txt,.m3u" />
                                            </template>
                                        </van-field>
                                    </template>
                                    <div class="flex justify-end">
                                        <van-button @click="pushIptvSource" size="small" type="primary">推送直播源</van-button>
                                    </div>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="混合模式">
                            <template #right-icon>
                                <van-radio-group direction="horizontal" v-model="configs.iptvHybridMode">
                                    <van-radio name="DISABLE">禁用</van-radio>
                                    <van-radio name="IPTV_FIRST">直播源优先</van-radio>
                                    <van-radio name="HYBRID_FIRST">混合优先</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell title="相似频道合并">
                            <template #right-icon><van-switch v-model="configs.iptvSimilarChannelMerge" size="20px" /></template>
                        </van-cell>
                        <van-cell title="频道图标提供">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <span>格式：{name} - 保持不变，{name|lowercase} - 小写，{name|uppercase} - 大写</span>
                                    <van-field class="!p-0" placeholder="https://live.fanmingming.com/tv/{name}.png" v-model="configs.iptvChannelLogoProvider"></van-field>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="频道图标覆盖">
                            <template #right-icon><van-switch v-model="configs.iptvChannelLogoOverride" size="20px" /></template>
                        </van-cell>
                        <van-cell title="频道别名">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <van-field :placeholder="channelAliasExample" class="!p-0" rows="5" type="textarea" v-model="channelAlias"></van-field>
                                    <div class="flex justify-end">
                                        <van-button @click="updateChannelAlias" size="small" type="primary">推送</van-button>
                                    </div>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="频道收藏启用">
                            <template #right-icon><van-switch v-model="configs.iptvChannelFavoriteEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell title="频道分组隐藏">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <span>每行一个分组名称</span>
                                    <van-field class="!p-0" rows="3" type="textarea" v-model="hiddenGroupText"></van-field>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="直播源缓存启用">
                            <template #right-icon><van-switch v-model="configs.iptvSourceCacheEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell title="直播源缓存时间">
                            <template #right-icon>
                                <van-stepper v-model="configs.iptvSourceCacheTimeHours" min="1" max="168" />
                            </template>
                            <template #label><span class="text-gray text-12px">小时</span></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="控制">
                        <van-cell title="数字选台">
                            <template #right-icon><van-switch v-model="configs.iptvChannelNoSelectEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell title="换台反转">
                            <template #right-icon><van-switch v-model="configs.iptvChannelChangeFlip" size="20px" /></template>
                        </van-cell>
                        <van-cell title="换台列表首尾循环">
                            <template #right-icon><van-switch v-model="configs.iptvChannelChangeListLoop" size="20px" /></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="节目单">
                        <van-cell title="启用节目单">
                            <template #right-icon><van-switch v-model="configs.epgEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell title="跟随直播源">
                            <template #right-icon><van-switch v-model="configs.epgSourceFollowIptv" size="20px" /></template>
                        </van-cell>
                        <van-cell title="自定义节目单">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <span>支持xml、xml.gz格式</span>
                                    <van-field class="!pl-0" input-align="right" label="名称" placeholder="节目单名称" v-model="epgSource.name"></van-field>
                                    <van-field class="!pl-0" input-align="right" label="链接" placeholder="节目单链接" v-model="epgSource.url"></van-field>
                                    <div class="flex justify-end">
                                        <van-button @click="pushEpgSource" size="small" type="primary">推送节目单</van-button>
                                    </div>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="节目单缓存时间">
                            <template #right-icon>
                                <van-stepper v-model="configs.epgCacheTimeHours" min="1" max="168" />
                            </template>
                            <template #label><span class="text-gray text-12px">小时</span></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="音轨">
                        <van-cell title="音轨排序">
                            <template #right-icon>
                                <van-radio-group direction="horizontal" v-model="configs.audioTrackSortMode">
                                    <van-radio name="LANGUAGE">按语言</van-radio>
                                    <van-radio name="CHANNELS">按声道</van-radio>
                                    <van-radio name="BITRATE">按比特率</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>
                </template>

                <template v-else-if="tabActive === 'player'">
                    <van-cell-group inset title="应用">
                        <van-cell title="开机自启">
                            <template #right-icon><van-switch v-model="configs.appBootLaunch" size="20px" /></template>
                        </van-cell>
                        <van-cell title="画中画">
                            <template #right-icon><van-switch v-model="configs.appPipEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell title="起始界面">
                            <template #right-icon>
                                <van-radio-group direction="horizontal" v-model="configs.appStartupScreen">
                                    <van-radio name="Dashboard">仪表盘</van-radio>
                                    <van-radio name="Live">直播</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="播放器">
                        <van-cell title="内核">
                            <template #right-icon>
                                <van-radio-group direction="horizontal" v-model="configs.videoPlayerCore">
                                    <van-radio name="MEDIA3">Media3</van-radio>
                                    <van-radio name="IJK">IjkPlayer</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell title="渲染方式">
                            <template #right-icon>
                                <van-radio-group direction="horizontal" v-model="configs.videoPlayerRenderMode">
                                    <van-radio name="SURFACE_VIEW">SurfaceView</van-radio>
                                    <van-radio name="TEXTURE_VIEW">TextureView</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell title="显示模式">
                            <template #label>
                                <van-radio-group direction="horizontal" v-model="configs.videoPlayerDisplayMode">
                                    <van-radio name="ORIGINAL">原始比例</van-radio>
                                    <van-radio name="FILL">填充</van-radio>
                                    <van-radio name="CROP">裁剪</van-radio>
                                    <van-radio name="FOUR_THREE">4:3</van-radio>
                                    <van-radio name="SIXTEEN_NINE">16:9</van-radio>
                                    <van-radio name="TWO_THIRTY_FIVE_ONE">2.35:1</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell title="自定义UA">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <van-field class="!p-0" placeholder="播放器自定义UA" v-model="configs.videoPlayerUserAgent"></van-field>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="自定义Headers">
                            <template #label>
                                <van-space class="w-full" direction="vertical" size="small">
                                    <van-field :placeholder="videoPlayerHeadersExample" autosize class="!p-0" rows="3" type="textarea" v-model="configs.videoPlayerHeaders"></van-field>
                                </van-space>
                            </template>
                        </van-cell>
                        <van-cell title="加载超时">
                            <template #right-icon>
                                <van-stepper v-model="configs.videoPlayerLoadTimeout" min="1000" max="60000" step="1000" />
                            </template>
                            <template #label><span class="text-gray text-12px">毫秒</span></template>
                        </van-cell>
                        <van-cell title="强制音频软解">
                            <template #right-icon><van-switch v-model="configs.videoPlayerForceAudioSoftDecode" size="20px" /></template>
                        </van-cell>
                        <van-cell title="停止上一媒体项">
                            <template #right-icon><van-switch v-model="configs.videoPlayerStopPreviousMediaItem" size="20px" /></template>
                        </van-cell>
                        <van-cell title="跳过多帧渲染">
                            <template #right-icon><van-switch v-model="configs.videoPlayerSkipMultipleFramesOnSameVSync" size="20px" /></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>
                </template>

                <template v-else-if="tabActive === 'ui'">
                    <van-cell-group inset title="显示">
                        <van-cell title="节目进度">
                            <template #right-icon><van-switch v-model="configs.uiShowEpgProgrammeProgress" size="20px" /></template>
                        </van-cell>
                        <van-cell title="常驻节目进度">
                            <template #right-icon><van-switch v-model="configs.uiShowEpgProgrammePermanentProgress" size="20px" /></template>
                        </van-cell>
                        <van-cell title="台标显示">
                            <template #right-icon><van-switch v-model="configs.uiShowChannelLogo" size="20px" /></template>
                        </van-cell>
                        <van-cell title="频道预览">
                            <template #right-icon><van-switch v-model="configs.uiShowChannelPreview" size="20px" /></template>
                        </van-cell>
                        <van-cell title="经典选台界面">
                            <template #right-icon><van-switch v-model="configs.uiUseClassicPanelScreen" size="20px" /></template>
                        </van-cell>
                        <van-cell title="时间显示模式">
                            <template #right-icon>
                                <van-radio-group direction="horizontal" v-model="configs.uiTimeShowMode">
                                    <van-radio name="HIDDEN">隐藏</van-radio>
                                    <van-radio name="ALWAYS">常显</van-radio>
                                    <van-radio name="EVERY_HOUR">整点</van-radio>
                                    <van-radio name="HALF_HOUR">半点</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="缩放">
                        <van-cell title="界面密度缩放">
                            <template #label>
                                <van-slider v-model="configs.uiDensityScaleRatio" :min="0" :max="2" :step="0.1" />
                            </template>
                        </van-cell>
                        <van-cell title="界面字体缩放">
                            <template #label>
                                <van-slider v-model="configs.uiFontScaleRatio" :min="0.5" :max="2" :step="0.1" />
                            </template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="交互">
                        <van-cell title="焦点优化">
                            <template #right-icon><van-switch v-model="configs.uiFocusOptimize" size="20px" /></template>
                        </van-cell>
                        <van-cell title="自动关闭延时">
                            <template #right-icon>
                                <van-stepper v-model="configs.uiScreenAutoCloseDelay" min="1000" max="60000" step="1000" />
                            </template>
                            <template #label><span class="text-gray text-12px">毫秒</span></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="性能">
                        <van-cell title="低性能模式">
                            <template #right-icon><van-switch v-model="configs.uiLowPerformanceMode" size="20px" /></template>
                        </van-cell>
                        <van-cell title="简化频道项">
                            <template #right-icon><van-switch v-model="configs.uiSimplifyChannelItem" size="20px" /></template>
                        </van-cell>
                        <van-cell title="频道网格列数">
                            <template #right-icon>
                                <van-stepper v-model="configs.uiChannelGridColumns" :min="3" :max="10" />
                            </template>
                        </van-cell>
                        <van-cell title="EPG更新间隔">
                            <template #right-icon>
                                <van-stepper v-model="configs.uiEpgUpdateIntervalMs" :min="5000" :max="300000" :step="5000" />
                            </template>
                            <template #label><span class="text-gray text-12px">毫秒</span></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="主题">
                        <van-cell title="主题选择" is-link @click="showThemePicker = true">
                            <template #value>{{ configs.themeAppCurrent?.name || '默认' }}</template>
                        </van-cell>
                        <van-popup v-model:show="showThemePicker" position="bottom" round>
                            <van-picker :columns="themeColumns" @confirm="onThemeConfirm" @cancel="showThemePicker = false" />
                        </van-popup>
                        <van-cell title="纹理透明度">
                            <template #label>
                                <van-slider v-model="configs.themeTextureAlpha" :min="0" :max="1" :step="0.1" />
                            </template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="缓存">
                        <van-cell title="节目单缓存启用">
                            <template #right-icon><van-switch v-model="configs.epgCacheEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell title="频道图标缓存启用">
                            <template #right-icon><van-switch v-model="configs.channelLogoCacheEnable" size="20px" /></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>
                </template>

                <template v-else-if="tabActive === 'sync'">
                    <van-cell-group inset title="云同步">
                        <van-cell title="自动拉取">
                            <template #right-icon><van-switch v-model="configs.cloudSyncAutoPull" size="20px" /></template>
                        </van-cell>
                        <van-cell title="服务商">
                            <template #label>
                                <van-radio-group direction="horizontal" v-model="configs.cloudSyncProvider">
                                    <van-radio name="GITHUB_GIST">GitHub Gist</van-radio>
                                    <van-radio name="GITEE_GIST">Gitee</van-radio>
                                    <van-radio name="NETWORK_URL">网络链接</van-radio>
                                    <van-radio name="LOCAL_FILE">本地文件</van-radio>
                                    <van-radio name="WEBDAV">WebDAV</van-radio>
                                </van-radio-group>
                            </template>
                        </van-cell>
                        <template v-if="configs.cloudSyncProvider === 'GITHUB_GIST'">
                            <van-cell title="Github Gist Id"><template #label><van-field class="!p-0" v-model="configs.cloudSyncGithubGistId"></van-field></template></van-cell>
                            <van-cell title="Github Gist Token"><template #label><van-field class="!p-0" v-model="configs.cloudSyncGithubGistToken"></van-field></template></van-cell>
                        </template>
                        <template v-if="configs.cloudSyncProvider === 'GITEE_GIST'">
                            <van-cell title="Gitee Id"><template #label><van-field class="!p-0" v-model="configs.cloudSyncGiteeGistId"></van-field></template></van-cell>
                            <van-cell title="Gitee Token"><template #label><van-field class="!p-0" v-model="configs.cloudSyncGiteeGistToken"></van-field></template></van-cell>
                        </template>
                        <template v-if="configs.cloudSyncProvider === 'NETWORK_URL'">
                            <van-cell title="网络链接"><template #label><van-field class="!p-0" v-model="configs.cloudSyncNetworkUrl"></van-field></template></van-cell>
                        </template>
                        <template v-if="configs.cloudSyncProvider === 'LOCAL_FILE'">
                            <van-cell title="本地文件路径"><template #label><van-field class="!p-0" v-model="configs.cloudSyncLocalFilePath"></van-field></template></van-cell>
                        </template>
                        <template v-if="configs.cloudSyncProvider === 'WEBDAV'">
                            <van-cell title="WebDAV 地址"><template #label><van-field class="!p-0" v-model="configs.cloudSyncWebDavUrl"></van-field></template></van-cell>
                            <van-cell title="WebDAV 用户名"><template #label><van-field class="!p-0" v-model="configs.cloudSyncWebDavUsername"></van-field></template></van-cell>
                            <van-cell title="WebDAV 密码"><template #label><van-field class="!p-0" v-model="configs.cloudSyncWebDavPassword"></van-field></template></van-cell>
                        </template>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="调试">
                        <van-cell title="开发者模式">
                            <template #right-icon><van-switch v-model="configs.debugDeveloperMode" size="20px" /></template>
                        </van-cell>
                        <van-cell title="显示FPS">
                            <template #right-icon><van-switch v-model="configs.debugShowFps" size="20px" /></template>
                        </van-cell>
                        <van-cell title="播放器详细信息">
                            <template #right-icon><van-switch v-model="configs.debugShowVideoPlayerMetadata" size="20px" /></template>
                        </van-cell>
                        <van-cell title="显示布局网格">
                            <template #right-icon><van-switch v-model="configs.debugShowLayoutGrids" size="20px" /></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>

                    <van-cell-group inset title="上传">
                        <van-cell title="上传APK">
                            <template #extra><van-uploader :after-read="uploadApkAfterRead" accept=".apk" /></template>
                        </van-cell>
                        <van-cell title="上传二进制">
                            <template #extra><van-uploader :after-read="uploadAllInOneAfterRead" accept="*.*" /></template>
                        </van-cell>
                        <van-cell title="二进制文件地址">
                            <template #label><van-field class="!p-0" v-model="configs.feiyangAllInOneFilePath"></van-field></template>
                        </van-cell>
                        <van-cell>
                            <div class="flex justify-end">
                                <van-button @click="pushConfigs" size="small" type="primary">推送</van-button>
                            </div>
                        </van-cell>
                    </van-cell-group>
                </template>

                <template v-else-if="tabActive === 'log'">
                    <van-list>
                        <van-cell :key="item.time" :label="item.cause" v-for="item in info.logHistory">
                            <template #title>
                                <div class="flex flex-col gap-1">
                                    <div class="flex gap-1 items-center">
                                        <van-tag plain>{{ item.tag }}</van-tag>
                                        <van-tag plain>{{ item.level }}</van-tag>
                                    </div>
                                    <span>{{ item.message }}</span>
                                </div>
                            </template>
                            <template #extra>
                                <span text="gray">{{ dayjs(item.time).format('HH:mm:ss') }}</span>
                            </template>
                        </van-cell>
                    </van-list>
                </template>

                <van-tabbar v-model="tabActive">
                    <van-tabbar-item icon="tv-o" name="live">直播</van-tabbar-item>
                    <van-tabbar-item icon="play-circle-o" name="player">播放</van-tabbar-item>
                    <van-tabbar-item icon="setting-o" name="ui">界面</van-tabbar-item>
                    <van-tabbar-item icon="tool-o" name="sync">同步</van-tabbar-item>
                    <van-tabbar-item icon="list-switch" name="log">日志</van-tabbar-item>
                </van-tabbar>
            </template>

            <van-empty image="network" v-else />
        </van-config-provider>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch, nextTick } = Vue

        const baseUrl = ""

        function getAccessToken() {
            const hash = window.location.hash
            if (hash && hash.startsWith('#token=')) {
                const token = hash.substring(7)
                if (token) {
                    localStorage.setItem('http_server_token', token)
                    localStorage.setItem('http_server_token_time', Date.now().toString())
                    window.location.hash = ''
                    return token
                }
            }
            const savedToken = localStorage.getItem('http_server_token')
            const savedTime = parseInt(localStorage.getItem('http_server_token_time') || '0')
            if (savedToken && (Date.now() - savedTime) < 3600000) {
                return savedToken
            }
            localStorage.removeItem('http_server_token')
            localStorage.removeItem('http_server_token_time')
            return null
        }

        let accessToken = getAccessToken()

        function clearToken() {
            accessToken = null
            localStorage.removeItem('http_server_token')
            localStorage.removeItem('http_server_token_time')
        }

        async function requestApi(url, config = {}) {
            const headers = { ...config.headers }
            if (config.body && typeof config.body === 'string' && !headers['Content-Type']) {
                if (config.body.startsWith('{') || config.body.startsWith('[')) {
                    headers['Content-Type'] = 'application/json'
                }
            }
            if (accessToken) {
                headers['Authorization'] = `Bearer ${accessToken}`
            }
            const resp = await fetch(`${baseUrl}${url}`, { ...config, headers })
            if (resp.status === 401) {
                clearToken()
                vant.showFailToast('授权已过期，请重新扫描二维码')
                throw new Error('Unauthorized: Token expired')
            }
            if (resp.status !== 200) {
                throw new Error(`请求失败：${resp.status}`)
            }
            return resp
        }

        dayjs.locale('zh-cn')
        dayjs.extend(dayjs_plugin_relativeTime)

        createApp({
            setup() {
                const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                const tabActive = ref('live')

                const info = ref()
                async function refreshInfo() {
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        info.value = await (await requestApi('/api/info')).json()
                        info.value.logHistory = info.value.logHistory.reverse()
                        vant.closeToast()
                    } catch (e) {
                        vant.showFailToast('无法获取信息')
                        console.error(e)
                    }
                }

                const configs = ref({})
                async function refreshConfigs() {
                    try {
                        configs.value = await (await requestApi('/api/configs')).json()
                        if (configs.value.iptvChannelGroupHiddenList) {
                            hiddenGroupText.value = Array.from(configs.value.iptvChannelGroupHiddenList).join('\n')
                        }
                    } catch (e) {
                        vant.showFailToast('无法获取配置')
                        console.error(e)
                    }
                }
                async function pushConfigs() {
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        const payload = { ...configs.value }
                        if (hiddenGroupText.value) {
                            payload.iptvChannelGroupHiddenList = hiddenGroupText.value.split('\n').filter(s => s.trim())
                        } else {
                            payload.iptvChannelGroupHiddenList = []
                        }
                        await requestApi('/api/configs', {
                            method: "POST",
                            body: JSON.stringify(payload),
                            headers: { 'Content-Type': 'application/json' }
                        })
                        await refreshConfigs()
                        vant.showSuccessToast("推送配置成功")
                    } catch (e) {
                        vant.showFailToast('推送配置失败')
                        console.error(e)
                    }
                }

                const hiddenGroupText = ref('')

                const iptvSource = ref({
                    name: `添加于${dayjs().format('YYYY-MM-DD HH:mm:ss')}`,
                    type: 'url', url: '', filePath: '', content: '',
                })
                async function pushIptvSource() {
                    if (!iptvSource.value.name) { vant.showFailToast('请填写直播源名称'); return }
                    if (iptvSource.value.type === 'url' && !iptvSource.value.url) { vant.showFailToast('请填写直播源链接'); return }
                    if (iptvSource.value.type === 'file' && !iptvSource.value.filePath) { vant.showFailToast('请填写直播源文件路径'); return }
                    if (iptvSource.value.type === 'content' && !iptvSource.value.content) { vant.showFailToast('请填写直播源内容'); return }
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        await requestApi('/api/iptv-source/push', {
                            method: "POST",
                            body: JSON.stringify({ ...iptvSource.value }),
                            headers: { 'Content-Type': 'application/json' }
                        })
                        vant.showSuccessToast("推送直播源成功")
                    } catch (e) { vant.showFailToast('推送直播源失败'); console.error(e) }
                }
                async function uploadIptvSourceContentAfterRead(file) {
                    const reader = new FileReader()
                    reader.onload = (e) => { iptvSource.value.content = e.target.result }
                    reader.readAsText(file.file)
                }

                const epgSource = ref({ name: `添加于${dayjs().format('YYYY-MM-DD HH:mm:ss')}`, url: '' })
                async function pushEpgSource() {
                    if (!epgSource.value.name) { vant.showFailToast('请填写节目单名称'); return }
                    if (!epgSource.value.url) { vant.showFailToast('请填写节目单链接'); return }
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        await requestApi('/api/epg-source/push', {
                            method: "POST",
                            body: JSON.stringify({ ...epgSource.value }),
                            headers: { 'Content-Type': 'application/json' }
                        })
                        vant.showSuccessToast("推送节目单成功")
                    } catch (e) { vant.showFailToast('推送节目单失败'); console.error(e) }
                }

                const channelAliasExample = `{\n    "__suffix": ["高码", "HD"],\n    "频道1": ["别名1", "别名2"]\n}`
                const channelAlias = ref('')
                async function refreshChannelAlias() {
                    channelAlias.value = await (await requestApi('/api/channel-alias')).text()
                }
                async function updateChannelAlias() {
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        await requestApi('/api/channel-alias', { method: "POST", body: channelAlias.value })
                        vant.showSuccessToast("更新频道别名成功")
                        await refreshChannelAlias()
                    } catch (e) { vant.showFailToast('更新频道别名失败'); console.error(e) }
                }

                async function uploadApkAfterRead(file) {
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        const formData = new FormData()
                        formData.append('filename', file.file)
                        await requestApi('/api/upload/apk', { method: "POST", body: formData })
                        vant.closeToast()
                    } catch (e) { vant.showFailToast('上传apk失败'); console.error(e) }
                }
                async function uploadAllInOneAfterRead(file) {
                    try {
                        vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        const formData = new FormData()
                        formData.append('filename', file.file)
                        await requestApi('/api/upload/allinone', { method: "POST", body: formData })
                        vant.closeToast()
                    } catch (e) { vant.showFailToast('上传AllInOne失败'); console.error(e) }
                }

                const videoPlayerHeadersExample = "Header-Name-1: Header-Value-1\nHeader-Name-2: Header-Value-2"

                const showThemePicker = ref(false)
                const themeList = ref([])
                const themeColumns = computed(() => {
                    const groups = {}
                    themeList.value.forEach(group => {
                        groups[group.name] = group.list.map(t => ({ text: t.name, value: t }))
                    })
                    return [Object.keys(groups).map(g => ({ text: g, children: groups[g] }))]
                })
                async function refreshThemes() {
                    try {
                        themeList.value = await (await requestApi('/api/themes')).json()
                    } catch (e) { console.error(e) }
                }
                function onThemeConfirm({ selectedOptions }) {
                    const theme = selectedOptions[1]?.value
                    if (theme) {
                        configs.value.themeAppCurrent = theme
                    }
                    showThemePicker.value = false
                }

                onMounted(async () => {
                    await refreshInfo()
                    await refreshChannelAlias()
                    await refreshConfigs()
                    await refreshThemes()
                })

                return {
                    dayjs, isDark, tabActive, info, configs, pushConfigs,
                    hiddenGroupText,
                    iptvSource, pushIptvSource, uploadIptvSourceContentAfterRead,
                    epgSource, pushEpgSource,
                    channelAliasExample, channelAlias, updateChannelAlias,
                    uploadApkAfterRead, uploadAllInOneAfterRead,
                    videoPlayerHeadersExample,
                    showThemePicker, themeColumns, onThemeConfirm,
                }
            }
        })
        .use(vant)
        .mount('#app')
    </script>
</body>

</html>
